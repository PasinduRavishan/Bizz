name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Lint and Type Check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Type check
        run: npx tsc --noEmit

  # Job 2: Test Smart Contracts
  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run contract tests
        run: npm run test:quiz
        timeout-minutes: 5
        continue-on-error: true  # Testnet might be flaky
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: logs/

  # Job 3: Build Next.js App
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
        env:
          # Public variables (safe to expose)
          NEXT_PUBLIC_BITCOIN_COMPUTER_NETWORK: regtest
          NEXT_PUBLIC_BITCOIN_COMPUTER_CHAIN: LTC
          NEXT_PUBLIC_BITCOIN_COMPUTER_URL: https://rltc.node.bitcoincomputer.io
          NEXT_PUBLIC_IPFS_GATEWAY: https://gateway.pinata.cloud/ipfs/
          NEXT_PUBLIC_PLATFORM_FEE: 0.02
          NEXT_PUBLIC_MIN_ENTRY_FEE: 5000
          NEXT_PUBLIC_APP_NAME: Bizz
          # Database (not used at build time but required for type checking)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/

  # Job 4: Deploy to Vercel (Production)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-contracts, build]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          # Authentication (CRITICAL)
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL_PRODUCTION }}
          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          # Encryption
          WALLET_ENCRYPTION_KEY: ${{ secrets.WALLET_ENCRYPTION_KEY }}
          REVEAL_DATA_KEY: ${{ secrets.REVEAL_DATA_KEY }}
          # Bitcoin Computer
          BITCOIN_COMPUTER_MNEMONIC: ${{ secrets.BITCOIN_COMPUTER_MNEMONIC }}
          # IPFS
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          # Reveal Windows (Production: 24 hours)
          STUDENT_REVEAL_WINDOW_MINUTES: 1440
          TEACHER_REVEAL_WINDOW_MINUTES: 1440

  # Job 5: Deploy to Vercel (Preview)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [test-contracts, build]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        env:
          # Authentication (CRITICAL) - Vercel auto-sets NEXTAUTH_URL for previews
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          # Encryption
          WALLET_ENCRYPTION_KEY: ${{ secrets.WALLET_ENCRYPTION_KEY }}
          REVEAL_DATA_KEY: ${{ secrets.REVEAL_DATA_KEY }}
          # Bitcoin Computer
          BITCOIN_COMPUTER_MNEMONIC: ${{ secrets.BITCOIN_COMPUTER_MNEMONIC }}
          # IPFS
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          # Reveal Windows (Testing: 5 minutes for previews)
          STUDENT_REVEAL_WINDOW_MINUTES: 5
          TEACHER_REVEAL_WINDOW_MINUTES: 5